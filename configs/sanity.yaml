# configs/sanity.yaml — fast 10-round check before committing to full runs
simulation:
  num_clients: 10
  num_rounds: 10
  clients_per_round: 3

model:
  name: cnn
  num_classes: 10

data:
  dataset: cifar10
  dirichlet_alpha: 0.5

hardware:
  min_speed: 0.3
  max_speed: 2.5

churn:
  drop_prob: 0.2
  min_rejoin_delay: 2
  max_rejoin_delay: 5
  rejoin_prob: 0.8

aggregation:
  strategy: FEDAVG
  staleness_alpha: 0.9
  loss_threshold: 3.0

training:
  local_epochs: 2
  batch_size: 32
  learning_rate: 0.01
  optimizer: sgd
  momentum: 0.9
  weight_decay: 0.0001

eval_every: 2
checkpoint_every: 5
seed: 42